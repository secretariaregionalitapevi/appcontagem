<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CCB Contagem&#10;Regional Itapevi" />
    <title>CCB Contagem - Regional Itapevi</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- PWA Manifest and Icons (matching CCB Agenda exactly) -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="icon" href="/icons/icon-192.png" />

    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f3f3f4;
        }

        body {
            overflow: hidden;
            /* Disable pull-to-refresh behavior on body to allow in-app scrollviews to handle it */
            overscroll-behavior-y: none;
        }

        #root {
            display: flex;
            height: 100%;
            flex: 1;
        }

        /* Forçar fontes nos alertas SweetAlert2 com máxima especificidade conforme modelo */
        .swal2-container, .swal2-popup, .swal2-toast {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
        }
        
        .swal2-title {
            font-family: 'Inter', sans-serif !important;
            font-weight: 700 !important;
            color: #4a4a4a !important;
            font-size: 24px !important;
            padding-top: 15px !important;
        }

        .swal2-html-container {
            font-family: 'Inter', sans-serif !important;
            color: #666 !important;
            font-size: 16px !important;
            margin-top: 10px !important;
        }

        .swal2-popup {
            border-radius: 20px !important;
            padding: 2rem !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
        }

        .swal2-confirm {
            border-radius: 12px !important;
            font-weight: 700 !important;
            padding: 12px 28px !important;
            font-size: 16px !important;
        }

        .swal2-cancel {
            border-radius: 12px !important;
            font-weight: 700 !important;
            padding: 12px 28px !important;
            font-size: 16px !important;
        }
    </style>
</head>

<body>
    <noscript>
        Para este aplicativo funcionar, é necessário habilitar o JavaScript.
    </noscript>

    <div id="root"></div>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ ServiceWorker registrado com sucesso com escopo: ', registration.scope);

                        // Forçar verificação imediata no carregamento inicial
                        registration.update();

                        // Detecta quando uma nova versão do SW for encontrada
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            if (newWorker) {
                                newWorker.addEventListener('statechange', () => {
                                    // Se a nova versão foi instalada e já existe um SW controlando a página (ou seja, é uma atualização)
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        console.log('🔄 Nova versão encontrada e instalada. Forçando ativação agressiva...');
                                        // Pede pro novo SW pular a fase de espera ("waiting") e assumir imediatamente
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    }
                                });
                            }
                        });

                        // Verificar atualizações automaticamente sempre que o usuário reabrir/focar no app
                        document.addEventListener('visibilitychange', () => {
                            if (document.visibilityState === 'visible') {
                                console.log('👀 App voltou ao foco. Verificando atualizações de cache...');
                                registration.update();
                            }
                        });
                    })
                    .catch((err) => {
                        console.error('❌ Registro do ServiceWorker falhou: ', err);
                    });
            });

            // Forçar reload da página instantaneamente assim que o novo Service Worker assumir o controle
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('🔄 Novo cache ativado! Recarregando a aplicação de forma oculta...');
                    window.location.reload();
                }
            });
        }
    </script>
</body>

</html>
